<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIRSTAFF – Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0D11; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; color: white; }
    .logo { font-size: 28px; font-weight: 800; color: #a78bfa; margin-bottom: 32px; letter-spacing: 2px; }
    #clerk-sign-in { width: 100%; max-width: 420px; }
    .footer { margin-top: 24px; font-size: 13px; color: #6b7280; }
    .footer a { color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">✦ AIRSTAFF</div>
  <div id="clerk-sign-in"></div>
  <p class="footer"><a href="/">← Back to home</a></p>
  <script>
    const clerk = new Clerk("pk_test_ZW5nYWdlZC1odW1wYmFjay03MS5jbGVyay5hY2NvdW50cy5kZXYk");
    clerk.load().then(() => {
      if (clerk.user) { window.location.href = "/dashboard.html"; }
      else { clerk.mountSignIn(document.getElementById("clerk-sign-in"), { afterSignInUrl: "/dashboard.html", afterSignUpUrl: "/dashboard.html" }); }
    });
  </script>
</body>
</html>
